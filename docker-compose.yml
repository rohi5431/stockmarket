version: "3.9"

services:

  market-server:
    build: ./Backend
    command: node src/server.js
    ports:
      - "5000:5000"
    environment:
      PORT1: 5000
      MONGO_URI: mongodb://mongo:27017/stockmarket
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    depends_on:
      - mongo
      - redis

  strategy-server:
    build: ./Backend
    command: node src/str.js
    ports:
      - "7000:7000"
    environment:
      PORT2: 7000
      MONGO_URI: mongodb://mongo:27017/stockmarket
    depends_on:
      - mongo
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"